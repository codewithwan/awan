name: awan profile

# Regenerates assets/awan.gif from awan.json. Triggers when you edit awan.json,
# nightly (so live numbers stay fresh), or by hand: Actions → Run workflow.
on:
  push:
    branches: [main, master] # profile repos use either
    paths: ["awan.json"]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  awan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install --git https://github.com/codewithwan/awan awan-profile

      # Pull the real numbers and write them into awan.json. The renderer never
      # touches the network — CI fetches, the binary just draws.
      - name: Fetch live stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }} # or hard-code any owner/name
        run: |
          api() { gh api "$1" --jq "$2" 2>/dev/null || echo "?"; }
          STARS=$(api "repos/$REPO" '.stargazers_count')
          FORKS=$(api "repos/$REPO" '.forks_count')
          PEOPLE=$(api "repos/$REPO/contributors?per_page=100" 'length')
          VERSION=$(api "repos/$REPO/releases/latest" '.tag_name')
          LICENSE=$(api "repos/$REPO" '.license.spdx_id')
          jq --arg s "$STARS" --arg f "$FORKS" --arg p "$PEOPLE" \
             --arg v "$VERSION" --arg l "$LICENSE" \
             '.stats = ["stars:\($s)", "forks:\($f)", "contributors:\($p)",
                        "version:\($v)", "license:\($l)"]' \
             awan.json > awan.tmp && mv awan.tmp awan.json

      - run: awan-profile whoami --config awan.json
      - name: Shrink the GIF
        run: |
          sudo apt-get update && sudo apt-get install -y gifsicle
          gifsicle -O3 --lossy=80 --colors 64 assets/awan.gif -o assets/awan.gif
      - name: Commit the result
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/awan.gif awan.json
          git commit -m "chore: refresh awan profile" || echo "no changes"
          git push
