name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  size:
    name: release binary size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release -p awan-cli
      - name: Report + guard size
        run: |
          bytes=$(stat -c%s target/release/awan)
          mb=$(awk "BEGIN{printf \"%.2f\", $bytes/1048576}")
          echo "### awan binary: ${mb} MB (${bytes} bytes)" >> "$GITHUB_STEP_SUMMARY"
          echo "awan binary: ${mb} MB (${bytes} bytes)"
          test "$bytes" -lt 3145728 # bloat guard: fail if over 3 MB

  test:
    name: test (${{ matrix.os }}, rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, "1.85"] # stable + the declared MSRV
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Test
        # awan-profile is an opt-in, publish=false tool; its deps (image, …)
        # need newer Rust than the core MSRV, so it's excluded from the matrix.
        run: cargo test --workspace --exclude awan-profile
