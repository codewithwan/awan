name: Release

# Tag a version to cut a release:  git tag v0.0.1 && git push --tags
# Builds the `awan` binary for every supported platform and attaches the
# archives to the GitHub Release. Language wrappers (npm, pip, …) download
# these archives, so the asset names here are the contract.

on:
  push:
    tags:
      # Semver only. "v*" also caught the moving @v0 tag the profile workflow
      # is pinned by, and every time we advanced it this job failed on a tag it
      # was never meant to see.
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Builds --release, packages awan-<target>.tar.gz (.zip on Windows),
      # and uploads it to the Release. Cross-compiles aarch64 linux for us.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: awan
          target: ${{ matrix.target }}
          archive: awan-$target
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}

  # Also publish the npm wrapper to GitHub Packages so it shows in the repo's
  # Packages sidebar. Uses the built-in token — no OTP, no extra secret. The
  # primary registry stays npmjs.org (published manually with your 2FA code).
  publish-gpr:
    needs: upload
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
      - run: npm publish
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
