name: Release

# Tag a version to cut a release:  git tag v0.0.1 && git push --tags
# Builds the `awan` binary for every supported platform and attaches the
# archives to the GitHub Release. Language wrappers (npm, pip, …) download
# these archives, so the asset names here are the contract.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Builds --release, packages awan-<target>.tar.gz (.zip on Windows),
      # and uploads it to the Release. Cross-compiles aarch64 linux for us.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: awan
          target: ${{ matrix.target }}
          archive: awan-$target
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}
